name: Deploy to GitHub Pages

# ── Triggers ────────────────────────────────────────────────────────────────
# Push to main deploys automatically.
# Manual trigger available via workflow_dispatch for testing.
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Permissions ──────────────────────────────────────────────────────────────
# Required for the peaceiris/actions-gh-pages action to push to gh-pages branch.
permissions:
  contents: write

jobs:
  build_and_deploy:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the source code
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Set up Flutter (pinned to 3.41.2 for deterministic builds)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: stable
          cache: true # Cache Flutter SDK between runs (~2 min savings)

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build Flutter Web
      #    BASE HREF = "/" because this site is served from the root of
      #    mj-khan.github.io (a user/org page repo).
      #    ⚠️  If you ever move to a project repo (e.g. github.com/mj-khan/portfolio),
      #         change --base-href "/" to --base-href "/portfolio/"
      - name: Build Flutter Web (release)
        run: flutter build web --release --base-href "/mjkweb/"

      # 5. Add .nojekyll so GitHub Pages serves Flutter's _flutter/ directory.
      #    Without this, Pages strips any folder/file starting with underscore.
      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      # 6. Copy index.html → 404.html so that direct-URL navigation (deep links,
      #    refreshes) falls back to the Flutter app instead of a GitHub 404 page.
      - name: Add SPA 404 fallback
        run: cp build/web/index.html build/web/404.html

      # 7. Deploy build/web to the gh-pages branch.
      #    GitHub Pages must be configured to serve from the gh-pages branch.
      #    ⚠️  CNAME: If you add a custom domain, place a CNAME file in web/
      #         (tracked in git) so it is included in every deployment.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages # ← branch GitHub Pages serves from
          # user_name: 'github-actions[bot]'
          # user_email: 'github-actions[bot]@users.noreply.github.com'
